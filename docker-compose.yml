version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tokendb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tokendb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Local Docker default: use the bundled postgres service unless you explicitly
      # provide a Docker-reachable DB URL via DATABASE_URL_DOCKER.
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://user:password@postgres:5432/tokendb}
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tokendb
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./scripts:/scripts

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-super-secret-nextauth-key-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      - backend

volumes:
  pgdata:
